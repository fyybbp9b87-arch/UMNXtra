<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMNXtraAI</title>

<style>

:root{
--bg:#07090d;
--red:#ff3048;
--green:#00ff99;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
font-family:Arial;
background:var(--bg);
color:white;
}

/* APP */
#app{
display:flex;
height:100vh;
width:100vw;
overflow:hidden;
}

/* SIDEBAR (SMALLER) */
#sidebar{
position:fixed;
top:0;
left:0;
bottom:0;

width:200px;

background:#0f141a;

padding:60px 10px 10px;

display:flex;
flex-direction:column;
gap:8px;

transition:0.25s;
z-index:200;
}

#sidebar.closed{
transform:translateX(-100%);
}

.sidebtn{
padding:10px;

border:none;
border-radius:10px;

background:#1a222c;

color:white;

font-size:13px;

cursor:pointer;
}

/* TOPBAR (SMALL) */
#topbar{
position:fixed;
top:0;
left:0;
right:0;

height:50px;

display:flex;
align-items:center;
gap:10px;

padding:0 10px;

background:#0d1117;

z-index:300;
}

#toggle{
width:36px;
height:36px;

border:none;
border-radius:10px;

background:linear-gradient(135deg,var(--red),var(--green));

color:white;

font-size:18px;

cursor:pointer;
}

#title{
font-size:14px;
font-weight:bold;
}

/* CHAT (FIXED FIT) */
#chat{
flex:1;

overflow-y:auto;

padding:60px 8px 70px;

display:flex;
flex-direction:column;
gap:8px;

width:100%;
max-width:100%;
}

/* MSG */
.msg{
padding:10px;

border-radius:12px;

font-size:14px;

max-width:95%;

word-wrap:break-word;
}

.user{
align-self:flex-end;
background:rgba(255,48,72,0.15);
}

.ai{
align-self:flex-start;
background:rgba(255,255,255,0.05);
}

/* INPUT (SMALL FIXED BAR) */
#bottom{
position:fixed;

bottom:0;
left:0;
right:0;

padding:6px;

background:#0d1117;
}

#inputwrap{
display:flex;
gap:6px;
}

textarea{
flex:1;

height:40px;

resize:none;

border:none;
outline:none;

border-radius:10px;

padding:8px;

font-size:14px;

background:#1a222c;

color:white;
}

button{
border:none;
border-radius:10px;

padding:8px 10px;

font-size:12px;

cursor:pointer;

color:white;
}

#send{
background:linear-gradient(135deg,var(--red),var(--green));
}

#imgbtn{
background:#1a222c;
}

</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar" class="closed">

<button class="sidebtn">📰 News</button>
<button class="sidebtn">⚽ Sports</button>
<button class="sidebtn">🌦 Weather</button>

</div>

<!-- MAIN -->
<div id="main">

<!-- TOPBAR -->
<div id="topbar">
<button id="toggle">☰</button>
<div id="title">UMNXtraAI</div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="bottom">
<div id="inputwrap">

<textarea id="input"></textarea>

<button id="send">Send</button>
<button id="imgbtn">Img</button>

</div>
</div>

</div>

</div>

<script>

const sidebar =
document.getElementById("sidebar");

document.getElementById("toggle")
.onclick=()=>sidebar.classList.toggle("closed");

const chat =
document.getElementById("chat");

const input =
document.getElementById("input");

function add(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.innerHTML=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

/* IMAGE BUTTON FIXED */
document.getElementById("imgbtn")
.onclick=async()=>{

const prompt=input.value.trim();

if(!prompt)return;

add(prompt,"user");

input.value="";

const loading=add("Generating image...","ai");

try{

const r=await fetch("/api/image",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const d=await r.json();

loading.remove();

if(d.image){

add(`<img src="${d.image}" style="width:100%;border-radius:10px">`,"ai");

}else{

add("Image failed","ai");

}

}catch{

loading.remove();

add("Error generating image","ai");

}

};

/* SEND (placeholder) */
document.getElementById("send")
.onclick=()=>add(input.value,"user");

</script>

</body>
</html>
