<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMN CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#07070a;
--sidebar:#0b0b10;
--text:#f5f5f5;
--accent:#00ff66;
--danger:#ff3b3b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
overflow:hidden;
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
}

/* SIDEBAR */
#sidebar{
width:220px;
min-width:220px;
background:var(--sidebar);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
padding:12px;
gap:10px;
}

.logo{
font-family:'Space Mono';
font-size:18px;
font-weight:bold;
background:linear-gradient(90deg,var(--danger),var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.btn{
padding:10px;
border:none;
border-radius:10px;
background:#17171f;
color:white;
cursor:pointer;
text-align:left;
font-weight:600;
}

.btn:hover{background:#23232d}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* CHAT */
#chat{
flex:1;
min-height:0;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:10px;
max-width:900px;
width:100%;
margin:auto;
}

/* MESSAGE */
.msg{
max-width:80%;
padding:12px;
border-radius:12px;
line-height:1.5;
word-wrap:break-word;
overflow:hidden;
}

.user{
align-self:flex-end;
background:rgba(255,59,59,0.15);
}

.ai{
align-self:flex-start;
background:rgba(0,255,102,0.08);
}

/* CODE */
pre{
background:#0b0b12;
padding:12px;
border-radius:10px;
overflow-x:auto;
margin-top:8px;
}

code{
font-family:'Space Mono';
color:var(--accent);
font-size:13px;
}

/* IMAGE FIX */
img{
max-width:100%;
width:100%;
height:auto;
border-radius:12px;
margin-top:8px;
display:block;
object-fit:cover;
}

/* INPUT */
#bottom{
flex-shrink:0;
padding:12px;
background:#0c0c12;
border-top:1px solid rgba(255,255,255,0.05);
}

#wrap{
display:flex;
gap:10px;
}

textarea{
flex:1;
resize:none;
border:none;
outline:none;
padding:12px;
border-radius:10px;
background:#151520;
color:white;
height:55px;
}

button{
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
font-family:'Space Mono';
color:white;
}

#send{
background:linear-gradient(135deg,var(--danger),var(--accent));
}

#img{
background:#1a1a22;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
<div class="logo">UMN CORE</div>

<button class="btn" onclick="news('general')">🌍 News</button>
<button class="btn" onclick="news('sports')">⚽ Sports</button>
<button class="btn" onclick="news('technology')">💻 Tech</button>
<button class="btn" onclick="weather()">🌦 Weather</button>
<button class="btn" onclick="clearChat()">🧹 Clear</button>
</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="bottom">
<div id="wrap">
<textarea id="input" placeholder="Message UMN CORE..."></textarea>
<button id="send">SEND</button>
<button id="img">IMG</button>
</div>
</div>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let messages=[];

/* ADD MESSAGE */
function add(text,type){

text=text.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');

const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* CHAT */
async function send(){

const text=input.value.trim();
if(!text)return;

add(text,"user");

messages.push({role:"user",content:text});

input.value="";

const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({messages})
});

const data=await res.json();

add(data.reply,"ai");

messages.push({role:"assistant",content:data.reply});

}

/* IMAGE (BETTER QUALITY) */
function img(){

const text=input.value.trim();
if(!text)return;

add(text,"user");

const styles=[
"ultra realistic cinematic lighting",
"cyberpunk neon futuristic city",
"anime style detailed",
"dark sci-fi concept art"
];

const style=styles[Math.floor(Math.random()*styles.length)];

const prompt=`masterpiece, 8k, ${style}, UMN aesthetic, ${text}`;

const url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt);

add(`<img src="${url}">`,"ai");

}

/* WEATHER */
async function weather(){

add("Loading weather...","ai");

const r=await fetch("https://wttr.in/?format=j1");
const d=await r.json();

add(`
🌍 ${d.nearest_area[0].areaName[0].value}<br>
🌡 ${d.current_condition[0].temp_C}°C<br>
☁ ${d.current_condition[0].weatherDesc[0].value}
`,"ai");

}

/* NEWS */
async function news(cat){

add("Loading "+cat+" news...","ai");

const r=await fetch("/api/news?category="+cat);
const d=await r.json();

let out="";
d.articles.slice(0,5).forEach(a=>{
out+=`<b>${a.title}</b><br>${a.description||""}<br><br>`;
});

add(out,"ai");

}

/* CLEAR */
function clearChat(){
chat.innerHTML="";
messages=[];
}

/* EVENTS */
document.getElementById("send").onclick=send;
document.getElementById("img").onclick=img;

</script>

</body>
</html>
